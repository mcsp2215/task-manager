<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pendientes</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231A1A18'/><line x1='9' y1='16' x2='14' y2='21' stroke='%23F0F0EA' stroke-width='2.5' stroke-linecap='round'/><line x1='14' y1='21' x2='23' y2='11' stroke='%23F0F0EA' stroke-width='2.5' stroke-linecap='round'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F4F0;
  --surface: #FFFFFF;
  --border: rgba(0,0,0,0.08);
  --border-mid: rgba(0,0,0,0.14);
  --text: #1A1A18;
  --text-mid: #5A5A56;
  --text-muted: #9A9A94;
  --radius: 12px;
  --radius-sm: 7px;
  --p-high: #D84040;
  --p-mid: #D48B1A;
  --p-low: #CACAC4;
  --c0: #6B63D4; --c0bg: #EEEDFD;
  --c1: #1A9E78; --c1bg: #E2F5EE;
  --c2: #2E85D4; --c2bg: #E6F1FB;
  --c3: #C85430; --c3bg: #FAF0EC;
  --c4: #B87818; --c4bg: #FAF0DA;
  --c5: #5E9820; --c5bg: #EEF5E2;
  --c6: #C24A78; --c6bg: #FCEAF2;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #161614;
    --surface: #1E1E1C;
    --border: rgba(255,255,255,0.08);
    --border-mid: rgba(255,255,255,0.14);
    --text: #F0F0EA;
    --text-mid: #A0A09A;
    --text-muted: #606058;
    --p-low: #48484A;
    --c0bg: #2A2848; --c1bg: #0E2E22; --c2bg: #0E2238;
    --c3bg: #2E1A12; --c4bg: #2E2010; --c5bg: #1A2610; --c6bg: #2E1222;
  }
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
}

.app {
  max-width: 680px;
  margin: 0 auto;
  padding: 2.5rem 1.25rem 4rem;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2rem;
}

.topbar-left { display: flex; align-items: baseline; gap: 12px; }

h1 {
  font-family: 'DM Mono', monospace;
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.02em;
}

.total-badge {
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
}

.btn-new-group {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text-mid);
  background: var(--surface);
  border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-sm);
  padding: 7px 14px;
  cursor: pointer;
  transition: background 0.1s;
}
.btn-new-group:hover { background: var(--bg); }

/* GROUP */
.group {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
}

.group-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 16px;
  cursor: pointer;
  user-select: none;
  border-left: 3px solid transparent;
}
.group-header:hover { filter: brightness(0.97); }

.gh-c0 { border-left-color: var(--c0); background: var(--c0bg); }
.gh-c1 { border-left-color: var(--c1); background: var(--c1bg); }
.gh-c2 { border-left-color: var(--c2); background: var(--c2bg); }
.gh-c3 { border-left-color: var(--c3); background: var(--c3bg); }
.gh-c4 { border-left-color: var(--c4); background: var(--c4bg); }
.gh-c5 { border-left-color: var(--c5); background: var(--c5bg); }
.gh-c6 { border-left-color: var(--c6); background: var(--c6bg); }

.group-toggle { font-size: 9px; color: var(--text-muted); width: 12px; flex-shrink: 0; }
.drag-handle {
  font-size: 13px; color: var(--text-muted); cursor: grab; padding: 0 2px;
  opacity: 0; flex-shrink: 0; line-height: 1; user-select: none;
}
.group-header:hover .drag-handle { opacity: 1; }
.drag-handle:active { cursor: grabbing; }
.group.drag-over { outline: 2px solid var(--border-mid); outline-offset: 2px; }
.group.dragging { opacity: 0.4; }
.group-name { font-size: 14px; font-weight: 500; flex: 1; color: var(--text); letter-spacing: 0.005em; }
.group-name-input {
  font-size: 14px; font-weight: 500; flex: 1; border: none;
  background: transparent; color: var(--text); outline: none;
  font-family: 'DM Sans', sans-serif;
}
.group-count {
  font-size: 11px; color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  background: rgba(0,0,0,0.05);
  border-radius: 10px; padding: 1px 8px;
}
@media (prefers-color-scheme: dark) {
  .group-count { background: rgba(255,255,255,0.07); }
}
.group-actions { display: flex; gap: 4px; opacity: 0; }
.group-header:hover .group-actions { opacity: 1; }
.group-action-btn {
  background: none; border: 0.5px solid transparent; cursor: pointer;
  color: var(--text-muted); font-size: 11px; padding: 3px 7px;
  border-radius: 4px; font-family: 'DM Sans', sans-serif; white-space: nowrap;
}
.group-action-btn:hover { color: var(--text-mid); border-color: var(--border-mid); background: var(--bg); }
.group-action-btn.danger:hover { color: var(--p-high); border-color: rgba(216,64,64,0.25); background: rgba(216,64,64,0.06); }

/* ITEMS */
.items-list { padding: 2px 16px 10px; }

.item-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 7px 0;
  border-top: 0.5px solid var(--border);
}
.item-row:first-child { border-top: none; }

.item-check {
  margin-top: 3px; width: 15px; height: 15px;
  cursor: pointer; flex-shrink: 0;
  accent-color: var(--text-mid);
}

.prio-wrap { position: relative; display: flex; align-items: center; margin-top: 5px; flex-shrink: 0; }
.priority-dot {
  width: 8px; height: 8px; border-radius: 50%;
  cursor: pointer; flex-shrink: 0;
  transition: transform 0.1s;
}
.priority-dot:hover { transform: scale(1.4); }
.p-high { background: var(--p-high); }
.p-mid  { background: var(--p-mid); }
.p-low  { background: var(--p-low); }
.prio-tip {
  display: none; position: absolute; left: 14px; top: -3px;
  background: var(--surface); border: 0.5px solid var(--border-mid);
  border-radius: 5px; font-size: 11px; color: var(--text-mid);
  padding: 3px 8px; white-space: nowrap; z-index: 10; pointer-events: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.prio-wrap:hover .prio-tip { display: block; }

.item-text { flex: 1; font-size: 14px; color: var(--text); line-height: 1.55; word-break: break-word; }
.item-text-input {
  flex: 1; font-size: 14px; color: var(--text); line-height: 1.55;
  border: none; background: transparent; outline: none;
  font-family: 'DM Sans', sans-serif; resize: none; width: 100%;
}
.item-del {
  background: none; border: none; color: var(--text-muted);
  font-size: 12px; cursor: pointer; padding: 0 2px; opacity: 0; margin-top: 3px;
}
.item-row:hover .item-del { opacity: 1; }
.item-del:hover { color: var(--text); }

.item-note-btn {
  background: none; border: none; cursor: pointer; color: var(--text-muted);
  font-size: 10px; padding: 1px 4px; margin-top: 3px; opacity: 0;
  font-family: 'DM Mono', monospace; border-radius: 3px;
  border: 0.5px solid transparent;
}
.item-row:hover .item-note-btn { opacity: 1; }
.item-note-btn:hover { color: var(--text-mid); border-color: var(--border-mid); }
.item-note-btn.has-note { opacity: 1; color: var(--text-mid); border-color: var(--border-mid); }

.item-note-area { padding: 0 0 8px 37px; }
.item-note-textarea {
  width: 100%; font-size: 12.5px; color: var(--text-mid); line-height: 1.6;
  border: none; border-left: 2px solid var(--border-mid);
  background: transparent; outline: none; resize: none;
  font-family: 'DM Sans', sans-serif; padding: 3px 0 3px 10px;
}
.item-note-textarea::placeholder { color: var(--text-muted); }
.item-note-textarea:focus { border-left-color: var(--text-muted); }

/* ADD ROW */
.add-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0 2px;
  border-top: 0.5px solid var(--border);
}
.add-prio { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
.prio-opt {
  width: 8px; height: 8px; border-radius: 50%;
  cursor: pointer; opacity: 0.3; transition: opacity 0.1s, transform 0.1s;
  flex-shrink: 0;
}
.prio-opt.sel { opacity: 1; transform: scale(1.25); }
.prio-opt:hover { opacity: 0.7; }
.add-input {
  flex: 1; font-size: 13px; color: var(--text-mid);
  border: none; background: transparent; outline: none;
  font-family: 'DM Sans', sans-serif;
}
.add-input::placeholder { color: var(--text-muted); }

/* LOG */
.log-section { margin-top: 2rem; }
.log-toggle {
  font-size: 12px; color: var(--text-muted); background: none; border: none;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  font-family: 'DM Mono', monospace;
}
.log-toggle:hover { color: var(--text-mid); }
.log-list {
  margin-top: 10px;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
}
.log-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 16px; border-top: 0.5px solid var(--border);
}
.log-item:first-child { border-top: none; }
.log-text { flex: 1; font-size: 13px; color: var(--text-muted); text-decoration: line-through; }
.log-meta { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
.log-badge {
  font-size: 11px; color: var(--text-muted);
  background: var(--bg); border-radius: 4px; padding: 1px 6px;
}
.restore-btn {
  font-size: 12px; color: var(--text-muted); background: none; border: none;
  cursor: pointer; margin-top: 1px; font-family: 'DM Mono', monospace;
}
.restore-btn:hover { color: var(--text); }

/* TABS */
.tabs {
  display: flex; gap: 2px; margin-bottom: 2rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0;
}
.tab-btn {
  font-family: 'DM Mono', monospace; font-size: 13px;
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); padding: 8px 16px 10px;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color 0.1s;
}
.tab-btn:hover { color: var(--text-mid); }
.tab-btn.active { color: var(--text); border-bottom-color: var(--text); }

/* STUDIES */
.studies-topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.25rem;
}
.studies-table {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.st-header {
  display: grid;
  grid-template-columns: 1fr 80px 60px 90px 90px 36px;
  gap: 0; padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.st-header span {
  font-size: 11px; color: var(--text-muted);
  font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em;
}
.st-row {
  display: grid;
  grid-template-columns: 1fr 80px 60px 90px 90px 36px;
  gap: 0; padding: 9px 14px; align-items: center;
  border-top: 0.5px solid var(--border);
}
.st-row:first-child { border-top: none; }
.st-row:hover { background: var(--bg); }
.st-cell { font-size: 13.5px; color: var(--text); }
.st-cell.muted { color: var(--text-muted); font-size: 13px; }
.st-edit {
  font-size: 13px; color: var(--text); background: transparent;
  border: none; outline: none; font-family: 'DM Sans', sans-serif;
  width: 100%; cursor: text;
  border-bottom: 1px dashed transparent;
}
.st-edit:hover { border-bottom-color: var(--border-mid); }
.st-edit:focus { border-bottom-color: var(--text-muted); }
.st-sid {
  font-family: 'DM Mono', monospace; font-size: 12px;
  color: var(--text-mid); background: transparent;
  border: none; outline: none; width: 100%; cursor: text;
  border-bottom: 1px dashed transparent;
}
.st-sid:hover { border-bottom-color: var(--border-mid); }
.st-sid:focus { border-bottom-color: var(--text-muted); }
.st-sid::placeholder { color: var(--text-muted); }
.st-link-btn {
  background: none; border: 0.5px solid var(--border-mid);
  border-radius: 5px; cursor: pointer; color: var(--text-mid);
  font-size: 13px; padding: 3px 7px; font-family: 'DM Sans', sans-serif;
}
.st-link-btn:hover:not(:disabled) { background: var(--text); color: var(--bg); border-color: var(--text); }
.st-link-btn:disabled { opacity: 0.3; cursor: default; }
.status-badge {
  font-size: 11px; font-family: 'DM Mono', monospace;
  border-radius: 4px; padding: 2px 7px; cursor: pointer;
  white-space: nowrap; border: 0.5px solid transparent;
  user-select: none;
}
.s-campo  { background: #E2F5EE; color: #1A7A5A; border-color: #A8DCC8; }
.s-sid    { background: #FAF0DA; color: #8A5A10; border-color: #E8CC80; }
.s-cerrado{ background: var(--bg); color: var(--text-muted); border-color: var(--border-mid); }
@media (prefers-color-scheme: dark) {
  .s-campo  { background: #0E2E22; color: #4ECFA0; border-color: #1A5A40; }
  .s-sid    { background: #2E2010; color: #E8A840; border-color: #5A4010; }
  .s-cerrado{ background: var(--bg); color: var(--text-muted); border-color: var(--border-mid); }
}
.st-del {
  background: none; border: none; color: var(--text-muted);
  font-size: 12px; cursor: pointer; opacity: 0; padding: 2px 4px;
}
.st-row:hover .st-del { opacity: 1; }
.st-del:hover { color: var(--p-high); }
.st-add-row {
  display: grid;
  grid-template-columns: 1fr 80px 60px 90px 90px 36px;
  gap: 0; padding: 9px 14px; align-items: center;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.st-add-input {
  font-size: 13px; color: var(--text-muted); background: transparent;
  border: none; outline: none; font-family: 'DM Sans', sans-serif; width: 100%;
}
.st-add-input::placeholder { color: var(--text-muted); }
.st-add-btn {
  font-size: 12px; color: var(--text-muted); background: none;
  border: 0.5px solid var(--border-mid); border-radius: 4px;
  padding: 3px 8px; cursor: pointer; font-family: 'DM Sans', sans-serif;
}
.st-add-btn:hover { color: var(--text); border-color: var(--text-mid); }
.inbox {
  background: var(--surface);
  border: 0.5px solid var(--border-mid);
  border-radius: var(--radius);
  margin-bottom: 20px;
  padding: 12px 16px;
}
.inbox-label {
  font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace;
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px;
}
.inbox-input-row {
  display: flex; align-items: center; gap: 10px;
}
.inbox-input {
  flex: 1; font-size: 14px; color: var(--text); border: none;
  background: transparent; outline: none; font-family: 'DM Sans', sans-serif;
}
.inbox-input::placeholder { color: var(--text-muted); }
.inbox-items { margin-top: 6px; }
.inbox-item {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 0; border-top: 0.5px solid var(--border);
}
.inbox-item-text { flex: 1; font-size: 14px; color: var(--text); }
.assign-select {
  font-size: 12px; color: var(--text-mid); background: var(--bg);
  border: 0.5px solid var(--border-mid); border-radius: 5px;
  padding: 3px 6px; cursor: pointer; font-family: 'DM Sans', sans-serif;
  outline: none; max-width: 140px;
}
.assign-select:focus { border-color: var(--text-muted); }
.inbox-del {
  background: none; border: none; color: var(--text-muted);
  font-size: 12px; cursor: pointer; padding: 0 2px; opacity: 0;
}
.inbox-item:hover .inbox-del { opacity: 1; }
.inbox-del:hover { color: var(--text); }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <h1 id="app-title">pendientes</h1>
      <span class="total-badge" id="total-badge"></span>
    </div>
    <button class="btn-new-group" id="topbar-action" onclick="addGroup()">+ nuevo grupo</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-pendientes" onclick="switchTab('pendientes')">pendientes</button>
    <button class="tab-btn" id="tab-estudios" onclick="switchTab('estudios')">estudios</button>
  </div>

  <!-- PESTAÑA PENDIENTES -->
  <div id="view-pendientes">
    <div class="inbox">
      <div class="inbox-label">entrada rápida</div>
      <div class="inbox-input-row">
        <input class="inbox-input" id="inbox-input" placeholder="escribe algo... (Enter para agregar)" onkeydown="addToInbox(event)">
      </div>
      <div class="inbox-items" id="inbox-items"></div>
    </div>
    <div id="groups-container"></div>
    <div class="log-section">
      <button class="log-toggle" id="log-btn" onclick="toggleLog()">
        ▶ completados (<span id="log-count">0</span>)
      </button>
      <div id="log-container" style="display:none;"></div>
    </div>
  </div>

  <!-- PESTAÑA ESTUDIOS -->
  <div id="view-estudios" style="display:none;">
    <div class="studies-topbar">
      <span class="total-badge" id="studies-count"></span>
    </div>
    <div class="studies-table">
      <div class="st-header">
        <span>estudio</span>
        <span>proveedor</span>
        <span>servidor</span>
        <span>estado</span>
        <span>SID</span>
        <span></span>
      </div>
      <div id="studies-list"></div>
      <div class="st-add-row">
        <input class="st-add-input" id="st-new-name" placeholder="+ agregar estudio..." onkeydown="addStudy(event)">
        <input class="st-add-input" id="st-new-prov" placeholder="proveedor" onkeydown="addStudy(event)">
        <input class="st-add-input" id="st-new-srv" placeholder="s4" onkeydown="addStudy(event)">
        <span></span>
        <input class="st-add-input" id="st-new-sid" placeholder="SID" onkeydown="addStudy(event)">
        <button class="st-add-btn" onclick="addStudyClick()">+</button>
      </div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'pendientes_v3';
const STUDIES_KEY = 'estudios_v1';
const COLORS = ['c0','c1','c2','c3','c4','c5','c6'];

const defaultStudies = [
  {id:'e1', name:'Sky - CHI/PER', proveedor:'NQ', servidor:'s4', sid:'254425', status:'campo'},
  {id:'e2', name:'Sky - PT',      proveedor:'NQ', servidor:'s4', sid:'917511', status:'campo'},
  {id:'e3', name:'Sky - Arg',     proveedor:'NQ', servidor:'s4', sid:'911141', status:'campo'},
  {id:'e4', name:'AC',            proveedor:'NQ', servidor:'s2', sid:'832553', status:'campo'},
  {id:'e5', name:'AMC - NQ',      proveedor:'NQ', servidor:'s4', sid:'',       status:'sid'},
  {id:'e6', name:'AMC - OW',      proveedor:'OW', servidor:'s4', sid:'',       status:'sid'},
  {id:'e7', name:'Dis Arg/Mex - NQ', proveedor:'NQ', servidor:'d1', sid:'896858', status:'campo'},
  {id:'e8', name:'Dis Brasil - NQ',  proveedor:'NQ', servidor:'d1', sid:'892833', status:'campo'},
  {id:'e9', name:'Dis Arg/Mex - OW', proveedor:'OW', servidor:'d3', sid:'268734', status:'campo'},
  {id:'e10',name:'Dis Brasil - OW',  proveedor:'OW', servidor:'d3', sid:'781897', status:'campo'},
  {id:'e11',name:'Post test - NQ',   proveedor:'NQ', servidor:'s4', sid:'',       status:'sid'},
  {id:'e12',name:'Post test - OW',   proveedor:'OW', servidor:'s4', sid:'',       status:'sid'},
  {id:'e13',name:'uandes-jovenes',   proveedor:'NQ', servidor:'s4', sid:'',       status:'sid'},
  {id:'e14',name:'uandes-adultos',   proveedor:'NQ', servidor:'s4', sid:'',       status:'sid'},
];

const defaultData = {
  groups: [
    { id:'g1', name:'Brasil Sky / NQ', color:'c0', collapsed:false, items:[
      {id:'i1',text:'Conversar con NQ sobre estudios Brasil Sky',priority:'high'},
      {id:'i2',text:'Brainstorming — sumar a presentación resultados',priority:'mid'}
    ]},
    { id:'g2', name:'Biblioteca', color:'c1', collapsed:false, items:[
      {id:'i3',text:'Definir estructura formal de plataforma',priority:'mid'},
      {id:'i4',text:'Read me con el maestro (estructura, lógica de árbol, nomenclatura)',priority:'low'},
      {id:'i5',text:'Revisar temas de acceso — Luis',priority:'mid'},
      {id:'i6',text:'Pedir Claude manual',priority:'low'}
    ]},
    { id:'g3', name:'Template Criteria', color:'c2', collapsed:false, items:[
      {id:'i7',text:'Desarrollarlo esta semana',priority:'high'},
      {id:'i8',text:'Revisar forma de desarrollar el diseño de PPT',priority:'mid'}
    ]},
    { id:'g4', name:'Transcripciones', color:'c3', collapsed:false, items:[
      {id:'i9',text:'Desarrollar protocolo',priority:'mid'}
    ]},
    { id:'g5', name:'Airtable', color:'c4', collapsed:false, items:[
      {id:'i10',text:'Backfill OA comercial',priority:'mid'},
      {id:'i11',text:'Conectar con Claude para hacer ajustes',priority:'low'},
      {id:'i12',text:'Resolver duplicación: propuestas en Airtable vs Biblioteca',priority:'mid'}
    ]},
    { id:'g6', name:'Pilotos', color:'c5', collapsed:false, items:[
      {id:'i13',text:'Consolidar info de los pilotos (PROCESAR)',priority:'high'},
      {id:'i14',text:'Activar piloto WhatsApp Wots',priority:'mid'}
    ]},
    { id:'g7', name:'BBDD clientes Criteria', color:'c6', collapsed:false, items:[
      {id:'i15',text:'Normalizar nombres duplicados en Directorio de clientes',priority:'mid'},
      {id:'i16',text:'Preparar Excel para llenar clientes e importar a Airtable',priority:'high'},
      {id:'i17',text:'Empezar a llenar Directorio con contactos',priority:'low'}
    ]}
  ],
  log: []
};

function load() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : defaultData; }
  catch(e) { return defaultData; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

let state = load();
let logVisible = false;
let newPrio = {};
let currentTab = 'pendientes';

function loadStudies() {
  try { const r = localStorage.getItem(STUDIES_KEY); return r ? JSON.parse(r) : defaultStudies; }
  catch(e) { return defaultStudies; }
}
function saveStudies() { localStorage.setItem(STUDIES_KEY, JSON.stringify(studies)); }
let studies = loadStudies();

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('view-pendientes').style.display = tab==='pendientes'?'block':'none';
  document.getElementById('view-estudios').style.display = tab==='estudios'?'block':'none';
  document.getElementById('tab-pendientes').classList.toggle('active', tab==='pendientes');
  document.getElementById('tab-estudios').classList.toggle('active', tab==='estudios');
  document.getElementById('topbar-action').style.display = tab==='pendientes'?'':'none';
  document.getElementById('total-badge').style.display = tab==='pendientes'?'':'none';
  if(tab==='estudios') renderStudies();
}

const STATUS_CYCLE = ['campo','sid','cerrado'];
const STATUS_LABEL = {campo:'en campo', sid:'sin SID', cerrado:'cerrado'};
const STATUS_CLASS = {campo:'s-campo', sid:'s-sid', cerrado:'s-cerrado'};

function renderStudies() {
  const active = studies.filter(s=>s.status!=='cerrado').length;
  document.getElementById('studies-count').textContent = `${active} activos · ${studies.length} total`;
  const list = document.getElementById('studies-list');
  list.innerHTML = '';
  studies.forEach(s => {
    const row = document.createElement('div');
    row.className = 'st-row';
    const hasLink = s.sid && s.servidor;
    const link = hasLink ? `https://${s.servidor}.criteriaonline.cl/dashboard/cuotas/index.php?sid=${s.sid}` : '';
    row.innerHTML = `
      <span class="st-cell">
        <input class="st-edit" value="${s.name}" onblur="updateStudy('${s.id}','name',this.value)" onkeydown="if(event.key==='Enter')this.blur()">
      </span>
      <span class="st-cell muted">
        <input class="st-edit" value="${s.proveedor}" onblur="updateStudy('${s.id}','proveedor',this.value)" onkeydown="if(event.key==='Enter')this.blur()">
      </span>
      <span class="st-cell muted">
        <input class="st-edit" value="${s.servidor}" onblur="updateStudy('${s.id}','servidor',this.value)" onkeydown="if(event.key==='Enter')this.blur()">
      </span>
      <span class="st-cell">
        <span class="status-badge ${STATUS_CLASS[s.status]}" onclick="cycleStatus('${s.id}')" title="clic para cambiar estado">
          ${STATUS_LABEL[s.status]}
        </span>
      </span>
      <span class="st-cell">
        <input class="st-sid" value="${s.sid}" placeholder="—" onblur="updateStudy('${s.id}','sid',this.value)" onkeydown="if(event.key==='Enter')this.blur()">
      </span>
      <span class="st-cell" style="display:flex;gap:4px;align-items:center;">
        <button class="st-link-btn" ${!hasLink?'disabled':''} onclick="openLink('${link}')" title="${link||'sin SID'}">→</button>
        <button class="st-del" onclick="delStudy('${s.id}')">✕</button>
      </span>`;
    list.appendChild(row);
  });
}

function updateStudy(id, field, val) {
  const s = studies.find(x=>x.id===id); if(!s) return;
  s[field] = val.trim();
  saveStudies(); renderStudies();
}
function cycleStatus(id) {
  const s = studies.find(x=>x.id===id); if(!s) return;
  const idx = STATUS_CYCLE.indexOf(s.status);
  s.status = STATUS_CYCLE[(idx+1) % STATUS_CYCLE.length];
  saveStudies(); renderStudies();
}
function openLink(url) { if(url) window.open(url, '_blank'); }
function delStudy(id) {
  studies = studies.filter(x=>x.id!==id);
  saveStudies(); renderStudies();
}
function addStudy(e) { if(e.key==='Enter') addStudyClick(); }
function addStudyClick() {
  const name = document.getElementById('st-new-name').value.trim(); if(!name) return;
  const prov = document.getElementById('st-new-prov').value.trim();
  const srv  = document.getElementById('st-new-srv').value.trim();
  const sid  = document.getElementById('st-new-sid').value.trim();
  studies.push({id:uid(), name, proveedor:prov, servidor:srv, sid, status:'sid'});
  saveStudies(); renderStudies();
  ['st-new-name','st-new-prov','st-new-srv','st-new-sid'].forEach(id=>{ document.getElementById(id).value=''; });
  document.getElementById('st-new-name').focus();
}

function renderInbox() {
  const cont = document.getElementById('inbox-items');
  cont.innerHTML = '';
  if(!state.inbox || !state.inbox.length) return;
  state.inbox.forEach(item => {
    const row = document.createElement('div');
    row.className = 'inbox-item';
    const opts = state.groups.map(g=>`<option value="${g.id}">${g.name}</option>`).join('');
    row.innerHTML = `
      <span class="inbox-item-text">${item.text}</span>
      <select class="assign-select" onchange="assignInbox('${item.id}',this.value)">
        <option value="">→ asignar a...</option>
        ${opts}
      </select>
      <button class="inbox-del" onclick="delInbox('${item.id}')">✕</button>`;
    cont.appendChild(row);
  });
}
function addToInbox(e) {
  if(e.key!=='Enter') return;
  const inp = document.getElementById('inbox-input');
  const text = inp.value.trim(); if(!text) return;
  if(!state.inbox) state.inbox = [];
  state.inbox.push({id:uid(), text});
  inp.value = '';
  save(); renderInbox();
}
function assignInbox(iid, gid) {
  if(!gid) return;
  const idx = state.inbox.findIndex(x=>x.id===iid); if(idx===-1) return;
  const item = state.inbox[idx];
  const g = state.groups.find(x=>x.id===gid); if(!g) return;
  g.items.push({id:uid(), text:item.text, priority:'low'});
  state.inbox.splice(idx,1);
  save(); render();
}
function delInbox(iid) {
  state.inbox = (state.inbox||[]).filter(x=>x.id!==iid);
  save(); renderInbox();
}

function uid() { return 'x' + Math.random().toString(36).slice(2,9); }
function plabel(p) { return p==='high'?'alta':p==='mid'?'media':'baja'; }
function pnext(p) { return p==='high'?'mid':p==='mid'?'low':'high'; }
function fdate(ts) { return new Date(ts).toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'2-digit'}); }
function total() { return state.groups.reduce((s,g)=>s+g.items.length,0); }

function render() {
  const t = total();
  document.getElementById('total-badge').textContent = t + (t===1?' ítem':' ítems');
  const cont = document.getElementById('groups-container');
  cont.innerHTML = '';
  state.groups.forEach((g, gi) => {
    const c = g.color || COLORS[gi % COLORS.length];
    const np = newPrio[g.id] || 'low';
    const wrap = document.createElement('div');
    wrap.className = 'group';
    wrap.setAttribute('draggable', 'true');
    wrap.dataset.gid = g.id;
    wrap.innerHTML = `
      <div class="group-header gh-${c}" onclick="toggleGroup('${g.id}')">
        <span class="drag-handle" onmousedown="event.stopPropagation()" title="arrastrar">⠿</span>
        <span class="group-toggle">${g.collapsed?'▶':'▼'}</span>
        <span class="group-name" id="gn-${g.id}" ondblclick="editName('${g.id}',event)">${g.name}</span>
        <span class="group-count">${g.items.length}</span>
        <div class="group-actions" onclick="event.stopPropagation()">
          <button class="group-action-btn" onclick="archiveGroup('${g.id}')" title="archivar grupo con sus ítems">✓ cerrar</button>
          <button class="group-action-btn danger" onclick="delGroup('${g.id}',event)" title="eliminar grupo sin registro">✕</button>
        </div>
      </div>`;
    if (!g.collapsed) {
      const list = document.createElement('div');
      list.className = 'items-list';
      g.items.forEach(item => {
        const itemWrap = document.createElement('div');

        const row = document.createElement('div');
        row.className = 'item-row';
        const hasNote = item.note && item.note.trim();
        row.innerHTML = `
          <input type="checkbox" class="item-check" onchange="completeItem('${g.id}','${item.id}')">
          <div class="prio-wrap">
            <span class="priority-dot p-${item.priority}" onclick="cyclePrio('${g.id}','${item.id}')"></span>
            <span class="prio-tip">prioridad ${plabel(item.priority)} — clic para cambiar</span>
          </div>
          <span class="item-text" ondblclick="editItem('${g.id}','${item.id}',this)">${item.text}</span>
          <button class="item-note-btn ${hasNote?'has-note':''}" id="notebtn-${item.id}" onclick="toggleNote('${g.id}','${item.id}')" title="notas">✎</button>
          <button class="item-del" onclick="delItem('${g.id}','${item.id}')">✕</button>`;
        itemWrap.appendChild(row);

        const noteArea = document.createElement('div');
        noteArea.className = 'item-note-area';
        noteArea.id = 'notearea-' + item.id;
        noteArea.style.display = (item.noteOpen || hasNote) ? 'block' : 'none';
        noteArea.innerHTML = `<textarea class="item-note-textarea" rows="2" placeholder="ideas, contexto, links..." onblur="saveNote('${g.id}','${item.id}',this.value)" oninput="autoResize(this)">${item.note||''}</textarea>`;
        itemWrap.appendChild(noteArea);

        list.appendChild(itemWrap);
      });
      const addRow = document.createElement('div');
      addRow.className = 'add-row';
      addRow.innerHTML = `
        <div class="add-prio">
          <span class="prio-opt p-high ${np==='high'?'sel':''}" onclick="setPrio('${g.id}','high')" title="alta"></span>
          <span class="prio-opt p-mid  ${np==='mid'?'sel':''}"  onclick="setPrio('${g.id}','mid')"  title="media"></span>
          <span class="prio-opt p-low  ${np==='low'?'sel':''}"  onclick="setPrio('${g.id}','low')"  title="baja"></span>
        </div>
        <input class="add-input" id="ai-${g.id}" placeholder="agregar pendiente..." onkeydown="addItem(event,'${g.id}')">`;
      list.appendChild(addRow);
      wrap.appendChild(list);
    }
    cont.appendChild(wrap);
  });
  renderLog();
  renderInbox();
  initDrag();
}

function initDrag() {
  const cont = document.getElementById('groups-container');
  let dragSrc = null;
  cont.querySelectorAll('.group').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragSrc = el;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      cont.querySelectorAll('.group').forEach(g => g.classList.remove('drag-over'));
    });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if(el !== dragSrc) {
        cont.querySelectorAll('.group').forEach(g => g.classList.remove('drag-over'));
        el.classList.add('drag-over');
      }
    });
    el.addEventListener('drop', e => {
      e.preventDefault();
      if(!dragSrc || dragSrc === el) return;
      const ids = [...cont.querySelectorAll('.group')].map(x => x.dataset.gid);
      const fromIdx = state.groups.findIndex(g => g.id === dragSrc.dataset.gid);
      const toIdx = state.groups.findIndex(g => g.id === el.dataset.gid);
      if(fromIdx === -1 || toIdx === -1) return;
      const [moved] = state.groups.splice(fromIdx, 1);
      state.groups.splice(toIdx, 0, moved);
      save(); render();
    });
  });
}

function renderLog() {
  document.getElementById('log-count').textContent = state.log.length;
  const cont = document.getElementById('log-container');
  cont.innerHTML = '';
  if (!logVisible || !state.log.length) return;
  const list = document.createElement('div');
  list.className = 'log-list';
  [...state.log].reverse().forEach(e => {
    const row = document.createElement('div');
    row.className = 'log-item';
    row.innerHTML = `
      <div style="flex:1;">
        <div class="log-text">${e.text}</div>
        <div style="display:flex;gap:8px;margin-top:4px;">
          <span class="log-badge">${e.groupName}</span>
          <span class="log-meta">${fdate(e.completedAt)}</span>
        </div>
      </div>
      <button class="restore-btn" onclick="restore('${e.id}')" title="restaurar">↩</button>`;
    list.appendChild(row);
  });
  cont.appendChild(list);
}

function toggleGroup(id) {
  const g = state.groups.find(x=>x.id===id);
  if(g) { g.collapsed=!g.collapsed; save(); render(); }
}
function toggleLog() {
  logVisible = !logVisible;
  const btn = document.getElementById('log-btn');
  btn.innerHTML = `${logVisible?'▼':'▶'} completados (<span id="log-count">${state.log.length}</span>)`;
  document.getElementById('log-container').style.display = logVisible?'block':'none';
  renderLog();
}
function completeItem(gid, iid) {
  const g = state.groups.find(x=>x.id===gid); if(!g) return;
  const idx = g.items.findIndex(x=>x.id===iid); if(idx===-1) return;
  const item = g.items[idx];
  state.log.push({id:uid(),text:item.text,groupName:g.name,priority:item.priority,completedAt:Date.now()});
  g.items.splice(idx,1);
  save(); render();
}
function delItem(gid, iid) {
  const g = state.groups.find(x=>x.id===gid);
  if(g) { g.items=g.items.filter(x=>x.id!==iid); save(); render(); }
}
function archiveGroup(gid) {
  const g = state.groups.find(x=>x.id===gid); if(!g) return;
  const ts = Date.now();
  g.items.forEach(item => {
    state.log.push({
      id: uid(), text: item.text, groupName: g.name,
      priority: item.priority, completedAt: ts, archived: true
    });
  });
  state.groups = state.groups.filter(x=>x.id!==gid);
  save(); render();
}
function delGroup(gid, e) {
  e.stopPropagation();
  if(!confirm('¿Eliminar este grupo? No quedará registro.')) return;
  state.groups = state.groups.filter(x=>x.id!==gid);
  save(); render();
}
function cyclePrio(gid, iid) {
  const g=state.groups.find(x=>x.id===gid); if(!g) return;
  const item=g.items.find(x=>x.id===iid); if(!item) return;
  item.priority=pnext(item.priority); save(); render();
}
function setPrio(gid, p) {
  newPrio[gid]=p; render();
  setTimeout(()=>{ const n=document.getElementById('ai-'+gid); if(n) n.focus(); },20);
}
function editItem(gid, iid, el) {
  const g=state.groups.find(x=>x.id===gid);
  const item=g&&g.items.find(x=>x.id===iid); if(!item) return;
  const inp=document.createElement('textarea');
  inp.className='item-text-input'; inp.value=item.text; inp.rows=1;
  el.replaceWith(inp); inp.focus();
  inp.addEventListener('blur',()=>{ item.text=inp.value.trim()||item.text; save(); render(); });
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();inp.blur();} });
}
function editName(gid, e) {
  e.stopPropagation();
  const g=state.groups.find(x=>x.id===gid); if(!g) return;
  const el=document.getElementById('gn-'+gid);
  const inp=document.createElement('input');
  inp.className='group-name-input'; inp.value=g.name;
  el.replaceWith(inp); inp.focus(); inp.select();
  inp.addEventListener('blur',()=>{ g.name=inp.value.trim()||g.name; save(); render(); });
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') inp.blur(); });
}
function addItem(e, gid) {
  if(e.key!=='Enter') return;
  const inp=document.getElementById('ai-'+gid);
  const text=inp.value.trim(); if(!text) return;
  const g=state.groups.find(x=>x.id===gid); if(!g) return;
  g.items.push({id:uid(),text,priority:newPrio[gid]||'low'});
  save(); render();
  setTimeout(()=>{ const n=document.getElementById('ai-'+gid); if(n) n.focus(); },30);
}
function restore(lid) {
  const idx=state.log.findIndex(x=>x.id===lid); if(idx===-1) return;
  const e=state.log[idx];
  const g=state.groups.find(x=>x.name===e.groupName);
  if(g) g.items.push({id:uid(),text:e.text,priority:e.priority});
  else state.groups.push({id:uid(),name:e.groupName,color:COLORS[state.groups.length%COLORS.length],collapsed:false,items:[{id:uid(),text:e.text,priority:e.priority}]});
  state.log.splice(idx,1);
  save(); render();
}

function toggleNote(gid, iid) {
  const g=state.groups.find(x=>x.id===gid); if(!g) return;
  const item=g.items.find(x=>x.id===iid); if(!item) return;
  item.noteOpen = !item.noteOpen;
  const area = document.getElementById('notearea-'+iid);
  if(area) {
    area.style.display = item.noteOpen ? 'block' : 'none';
    if(item.noteOpen) { const ta=area.querySelector('textarea'); if(ta){ta.focus();autoResize(ta);} }
  }
}
function saveNote(gid, iid, val) {
  const g=state.groups.find(x=>x.id===gid); if(!g) return;
  const item=g.items.find(x=>x.id===iid); if(!item) return;
  item.note = val;
  const btn = document.getElementById('notebtn-'+iid);
  if(btn) btn.classList.toggle('has-note', !!(val&&val.trim()));
  save();
}
function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function addGroup() {
  const newId = uid();
  const color = COLORS[state.groups.length % COLORS.length];
  state.groups.push({id:newId, name:'nuevo grupo', color, collapsed:false, items:[]});
  save(); render();
  // activar edición inmediata del nombre
  setTimeout(()=>{
    const el = document.getElementById('gn-'+newId);
    if(el) el.dispatchEvent(new MouseEvent('dblclick', {bubbles:true}));
  }, 50);
}

render();
</script>
